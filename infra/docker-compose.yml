services:
  db:
    image: postgres:15
    container_name: clinic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_pass
    ports:
      - "5432:5432"
    volumes:
      - clinic_db_data:/var/lib/postgresql/data
      - ./db/init/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: clinic-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://clinic_user:clinic_pass@db:5432/clinic
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: clinic-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  clinic_db_data:
