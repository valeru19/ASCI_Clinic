openapi: 3.0.3
info:
  title: AIS Clinic API
  version: 1.0.0
  description: OpenAPI-описание ключевых эндпоинтов АИС "Клиника"

servers:
  - url: https://api.clinic.local
    description: Production
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Auth
  - name: Doctors
  - name: Patients
  - name: Schedules
  - name: Appointments
  - name: Visits
  - name: Laboratory
  - name: Reports

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginFormRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя по JWT
      responses:
        '200':
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Пользователь неактивен или не имеет доступа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/doctors:
    post:
      tags: [Doctors]
      summary: Создание врача (кадровый контур)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorCreateRequest'
      responses:
        '201':
          description: Врач создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/doctors/{doctor_id}/employment:
    patch:
      tags: [Doctors]
      summary: Обновить кадровые параметры врача (оклад/премия/статус)
      parameters:
        - in: path
          name: doctor_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorEmploymentUpdateRequest'
      responses:
        '200':
          description: Параметры врача обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/specialties:
    get:
      tags: [Doctors]
      summary: Список специализаций врачей
      responses:
        '200':
          description: Справочник специализаций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecialtyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Конфликт уникальных полей (username/email/license)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Doctors]
      summary: Список врачей для UI и фильтров
      parameters:
        - in: query
          name: include_inactive
          schema:
            type: boolean
            default: false
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список врачей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/patients:
    post:
      tags: [Patients]
      summary: Регистрация пациента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreateRequest'
      responses:
        '201':
          description: Пациент создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Patients]
      summary: Поиск пациентов
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 255
        - in: query
          name: birth_date
          schema:
            type: string
            format: date
        - in: query
          name: include_inactive
          schema:
            type: boolean
            default: false
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список пациентов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/patients/{patient_id}:
    get:
      tags: [Patients]
      summary: Карточка пациента
      parameters:
        - in: path
          name: patient_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Пациент
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Patients]
      summary: Обновление данных пациента
      parameters:
        - in: path
          name: patient_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdateRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Patients]
      summary: Деактивация пациента (soft delete)
      parameters:
        - in: path
          name: patient_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Деактивирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/schedules:
    post:
      tags: [Schedules]
      summary: Создание расписания врача
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleCreateRequest'
      responses:
        '201':
          description: Расписание создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Schedules]
      summary: Список расписаний
      parameters:
        - in: query
          name: doctor_id
          schema:
            type: string
            format: uuid
        - in: query
          name: weekday
          schema:
            type: integer
            minimum: 1
            maximum: 7
        - in: query
          name: include_inactive
          schema:
            type: boolean
            default: false
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список расписаний
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/schedule-slots/generate:
    post:
      tags: [Schedules]
      summary: Генерация временных слотов по расписанию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSlotGenerateRequest'
      responses:
        '201':
          description: Слоты созданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleSlotGenerateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/schedule-slots:
    get:
      tags: [Schedules]
      summary: Просмотр слотов по врачу и диапазону дат
      parameters:
        - in: query
          name: doctor_id
          schema:
            type: string
            format: uuid
        - in: query
          name: date_from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            type: string
            enum: [available, booked, blocked, cancelled]
            default: available
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список слотов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleSlotListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/schedule-exceptions:
    post:
      tags: [Schedules]
      summary: Создание исключения расписания (отпуск/больничный)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleExceptionCreateRequest'
      responses:
        '201':
          description: Исключение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleExceptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/appointments:
    post:
      tags: [Appointments]
      summary: Запись пациента на прием
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        '201':
          description: Запись создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Appointments]
      summary: Получить список записей
      parameters:
        - in: query
          name: doctor_id
          schema:
            type: string
            format: uuid
        - in: query
          name: patient_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [planned, confirmed, cancelled, completed, no_show]
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список записей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/appointments/{appointment_id}/cancel:
    patch:
      tags: [Appointments]
      summary: Отмена записи
      parameters:
        - in: path
          name: appointment_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCancelRequest'
      responses:
        '200':
          description: Запись отменена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/appointments/{appointment_id}/reschedule:
    patch:
      tags: [Appointments]
      summary: Перенос записи на другой слот
      parameters:
        - in: path
          name: appointment_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRescheduleRequest'
      responses:
        '200':
          description: Запись перенесена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/visits:
    post:
      tags: [Visits]
      summary: Создать визит по записи
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitCreateRequest'
      responses:
        '201':
          description: Визит создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Visits]
      summary: Список визитов с фильтрами
      parameters:
        - in: query
          name: doctor_id
          schema:
            type: string
            format: uuid
        - in: query
          name: patient_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [in_progress, completed, cancelled]
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Список визитов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/visits/{visit_id}:
    get:
      tags: [Visits]
      summary: Получить визит по id
      parameters:
        - in: path
          name: visit_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Визит
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/visits/{visit_id}/complete:
    patch:
      tags: [Visits]
      summary: Завершить визит
      parameters:
        - in: path
          name: visit_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitCompleteRequest'
      responses:
        '200':
          description: Визит завершен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/visits/{visit_id}/diagnoses:
    post:
      tags: [Visits]
      summary: Добавить диагнозы к визиту
      description: |
        RBAC-правила:
        - admin может назначать диагнозы любому визиту в любом статусе;
        - doctor может назначать диагнозы только визитам своих пациентов и только после завершения приема (`appointment=completed` и `visit=completed`).
      parameters:
        - in: path
          name: visit_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosesCreateRequest'
      responses:
        '201':
          description: Диагнозы добавлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosesCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/visits/{visit_id}/prescriptions:
    post:
      tags: [Visits]
      summary: Добавить назначения к визиту
      parameters:
        - in: path
          name: visit_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionsCreateRequest'
      responses:
        '201':
          description: Назначения добавлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericCreateResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/visits/{visit_id}/referrals:
    post:
      tags: [Visits]
      summary: Добавить направления к визиту
      parameters:
        - in: path
          name: visit_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferralsCreateRequest'
      responses:
        '201':
          description: Направления добавлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralsCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/labs/orders:
    post:
      tags: [Laboratory]
      summary: Создать лабораторное направление по визиту
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabOrderCreateRequest'
      responses:
        '201':
          description: Направление создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/labs/orders/{order_id}/items:
    post:
      tags: [Laboratory]
      summary: Добавить тесты в лабораторное направление
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabOrderItemsCreateRequest'
      responses:
        '201':
          description: Тесты добавлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabOrderItemsCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/labs/results:
    post:
      tags: [Laboratory]
      summary: Внести результат анализа
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabResultCreateRequest'
      responses:
        '201':
          description: Результат внесен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
