components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Ошибка валидации входных данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Требуется аутентификация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт состояния
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    LoginFormRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 1
          maxLength: 128

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 128

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        expires_in:
          type: integer
          minimum: 1

    CurrentUserResponse:
      type: object
      required: [id, username, email, role, is_active]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, doctor, registrar, patient]
        is_active:
          type: boolean

    DoctorListItem:
      type: object
      required: [id, full_name, license_number, experience_years, specializations, monthly_salary, bonus_percent, is_active]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        last_name:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        middle_name:
          type: string
          nullable: true
        full_name:
          type: string
        license_number:
          type: string
        experience_years:
          type: integer
          minimum: 0
        specializations:
          type: array
          items:
            type: string
        monthly_salary:
          type: number
          minimum: 0
        bonus_percent:
          type: number
          minimum: 0
          maximum: 100
        is_active:
          type: boolean

    DoctorListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DoctorListItem'
        total:
          type: integer
          minimum: 0

    DoctorCreateRequest:
      type: object
      required: [username, email, password, last_name, first_name, license_number, experience_years]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        middle_name:
          type: string
          maxLength: 100
        license_number:
          type: string
          minLength: 3
          maxLength: 50
        experience_years:
          type: integer
          minimum: 0
          maximum: 60
        specialty_ids:
          type: array
          items:
            type: integer
            minimum: 1
          maxItems: 10
        monthly_salary:
          type: number
          minimum: 0
          maximum: 10000000
          default: 0
        bonus_percent:
          type: number
          minimum: 0
          maximum: 100
          default: 0
        is_active:
          type: boolean
          default: true

    DoctorEmploymentUpdateRequest:
      type: object
      properties:
        monthly_salary:
          type: number
          minimum: 0
          maximum: 10000000
        bonus_percent:
          type: number
          minimum: 0
          maximum: 100
        is_active:
          type: boolean

    SpecialtyItem:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string

    SpecialtyListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SpecialtyItem'
        total:
          type: integer
          minimum: 0

    PatientCreateRequest:
