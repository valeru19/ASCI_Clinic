      properties:
        id:
          type: string
          format: uuid
        last_name:
          type: string
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [M, F, O]
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        insurance_number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        is_active:
          type: boolean

    PatientListResponse:
