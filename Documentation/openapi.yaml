          minLength: 1
          maxLength: 100
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        middle_name:
          type: string
          maxLength: 100
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [M, F, O]
        phone:
